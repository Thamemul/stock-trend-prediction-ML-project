# ============================================================
# deploy.yml -- CI/CD Pipeline for Stock Price Trend Prediction
#
# Trigger: Every push to 'main'
# Steps:
#   1. Checkout code
#   2. Setup Python 3.11
#   3. Install dependencies
#   4. Train model (generate model.pkl, scaler.pkl, metrics.json)
#   5. Run Flask app tests
#   6. Verify /health endpoint
#   7. Deploy to Render
# ============================================================

name: Train, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Train + Test ───────────────────────────────────
  train-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Train the model
      - name: Train model
        run: python train_model.py

      # 5. Verify model artifacts exist
      - name: Verify artifacts
        run: |
          echo "Checking generated artifacts..."
          test -f model.pkl     && echo "  model.pkl        OK" || exit 1
          test -f scaler.pkl    && echo "  scaler.pkl       OK" || exit 1
          test -f metrics.json  && echo "  metrics.json     OK" || exit 1
          test -f label_encoder.pkl && echo "  label_encoder.pkl OK" || exit 1
          echo "All artifacts present."

      # 6. Run pytest suite
      - name: Run tests
        run: pytest test_app.py -v --tb=short

      # 7. Start Flask & verify /health
      - name: Verify health endpoint
        run: |
          python app.py &
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          echo "Health check returned: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
          curl -s http://localhost:5000/health | python -m json.tool
          kill %1

  # ── Job 2: Deploy to Render ───────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: train-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        run: |
          echo "Triggering Render deployment..."
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
          echo "Deployment triggered successfully!"
