name: Train, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  train-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python train_model.py

      - name: Verify artifacts
        run: |
          test -f model.pkl         && echo "model.pkl OK"         || exit 1
          test -f scaler.pkl        && echo "scaler.pkl OK"        || exit 1
          test -f metrics.json      && echo "metrics.json OK"      || exit 1
          test -f label_encoder.pkl && echo "label_encoder.pkl OK" || exit 1

      - name: Run tests
        run: pytest test_app.py -v --tb=short

      - name: Verify health endpoint
        run: |
          python app.py &
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          echo "Health check: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
          kill %1

  deploy:
    runs-on: ubuntu-latest
    needs: train-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Render
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}'
